<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign up</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./auth.js" defer></script>
    <script defer>
      window.addEventListener("DOMContentLoaded", () => {
        window.AuthDemo.initSignupPage();
      });
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="container--wide site-header-inner">
        <div class="brand brand--hero">
          <a href="./index.html" class="brand-link">
            <div class="logo" aria-hidden="true"></div>
            <span class="brand-title">Resume Analyzer</span>
          </a>
        </div>
        <nav class="nav-links" aria-label="Primary">
          <a href="./login.html" class="link">Login</a>
          <a href="./signup.html" class="link">Sign Up</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="card" aria-label="Sign up">
        <h1>Create account</h1>
        <p class="subtitle">Sign up to create your account, then analyze your resume.</p>

        <form data-form="signup" novalidate>
          <label>
            Email
            <input id="email" type="email" inputmode="email" autocomplete="email" required />
          </label>

          <label>
            Password
            <input id="password" type="password" autocomplete="new-password" required />
          </label>

          <label>
            Confirm password
            <input id="confirmPassword" type="password" autocomplete="new-password" required />
          </label>

          <div class="row">
            <button class="btn" type="submit">Create account</button>
            <a class="link" href="./login.html">Back to login</a>
          </div>
        </form>

        <p class="message" data-message hidden></p>
        <p class="small" style="margin-top: 12px">
          Note: this is a front-end demo. Accounts are stored in your browser’s localStorage.
        </p>
      </section>
    </main>
  </body>
</html>
