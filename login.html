<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login – AI-Powered Resume Analyzer</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./auth.js" defer></script>
    <script defer>
      window.addEventListener("DOMContentLoaded", () => {
        window.AuthDemo.initCommon();
        window.AuthDemo.initLoginPage();
      });
    </script>
  </head>
  <body>
    <main class="container">
      <section class="card" aria-label="Login">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <h1>Welcome back</h1>
        </div>
        <p class="subtitle">Log in to analyze and save your resume results.</p>

        <form data-form="login" novalidate>
          <label>
            Email
            <input id="email" type="email" inputmode="email" autocomplete="email" required />
          </label>

          <label>
            Password
            <input id="password" type="password" autocomplete="current-password" required />
          </label>

          <div class="row">
            <button class="btn" type="submit">Log in</button>
            <a class="link" href="./signup.html">Create an account</a>
          </div>
        </form>

        <p class="message" data-message hidden></p>
      </section>
    </main>
  </body>
</html>
